<!DOCTYPE html>
<html>
<head>
    <title>Railway Booking Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    Railway Booking Demo
</nav>

<div class="container">

    <h2>Search Trains</h2>

    <label>From Station</label>
    <input id="from" type="text" placeholder="Lucknow">

    <label>To Station</label>
    <input id="to" type="text" placeholder="Delhi">

    <label>Date</label>
    <input id="date" type="date">

    <button onclick="searchTrain()">
        Search Trains
    </button>

    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
